<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #e0e0e0; font-family: -apple-system, sans-serif; 
            touch-action: none; 
        }
        canvas { display: block; background: #fff; cursor: crosshair; }
        
        .ui-panel {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 15px; padding: 12px 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px; box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            z-index: 100; align-items: center;
        }
        input[type="color"] {
            -webkit-appearance: none; border: none; width: 45px; height: 45px;
            border-radius: 50%; cursor: pointer; background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        .info {
            position: fixed; top: 10px; left: 10px;
            background: rgba(0,0,0,0.6); color: white;
            padding: 6px 15px; border-radius: 20px; font-size: 13px;
            pointer-events: none; transition: opacity 0.3s;
        }
        #btn-reset { border:none; background:none; font-size:24px; cursor: pointer; padding: 0; margin: 0; }
    </style>
</head>
<body>

<div class="info" id="status">Загрузка холста...</div>

<div class="ui-panel">
    <input type="color" id="colorPicker" value="#000000">
    <button id="btn-reset" title="В центр">🏠</button>
</div>

<canvas id="canvas"></canvas>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, set, onChildAdded, onChildChanged } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    // --- ТВОЙ FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyDApXhn_Q3dF9kU9E_4uBrdk0wlcd09RHU",
      authDomain: "pixelbattale.firebaseapp.com",
      projectId: "pixelbattale",
      storageBucket: "pixelbattale.firebasestorage.app",
      messagingSenderId: "791983193798",
      appId: "1:791983193798:web:638379e16f2ab67aabe1c7",
      measurementId: "G-VLD5EVYFF0",
      // База данных Realtime обычно имеет такой URL:
      databaseURL: "https://pixelbattale-default-rtdb.firebaseio.com" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    const WORLD_SIZE = 1000;
    let camera = { x: 500, y: 500, zoom: 8 };
    let pixels = new Map();
    let pointers = new Map();
    let prevDiff = -1;
    let isMoving = false;
    let startPos = { x: 0, y: 0 };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.addEventListener('resize', resize);
    resize();

    // --- СИНХРОНИЗАЦИЯ ---
    const pixelsRef = ref(db, 'pixels');
    
    onChildAdded(pixelsRef, (data) => {
        const val = data.val();
        pixels.set(`${val.x}_${val.y}`, val.color);
        render();
    });

    onChildChanged(pixelsRef, (data) => {
        const val = data.val();
        pixels.set(`${val.x}_${val.y}`, val.color);
        render();
    });

    // --- ОТРИСОВКА ---
    function render() {
        ctx.fillStyle = "#e0e0e0";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(camera.zoom, camera.zoom);
        ctx.translate(-camera.x, -camera.y);

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        pixels.forEach((color, key) => {
            const [x, y] = key.split('_').map(Number);
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
        });

        if (camera.zoom > 10) {
            ctx.lineWidth = 0.02;
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            ctx.beginPath();
            for(let i=0; i<=WORLD_SIZE; i+=5) {
                ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE);
                ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i);
            }
            ctx.stroke();
        }
        ctx.restore();
        status.innerText = `X: ${Math.round(camera.x)} Y: ${Math.round(camera.y)} | Zoom: ${camera.zoom.toFixed(1)}x`;
    }

    // --- УПРАВЛЕНИЕ ---
    canvas.addEventListener('pointerdown', (e) => {
        pointers.set(e.pointerId, e);
        isMoving = false;
        startPos = { x: e.clientX, y: e.clientY };
    });

    canvas.addEventListener('pointermove', (e) => {
        if (!pointers.has(e.pointerId)) return;
        
        const prevPointer = pointers.get(e.pointerId);
        const dx = e.clientX - prevPointer.clientX;
        const dy = e.clientY - prevPointer.clientY;

        if (Math.abs(e.clientX - startPos.x) > 10 || Math.abs(e.clientY - startPos.y) > 10) {
            isMoving = true;
        }

        if (pointers.size === 1) {
            camera.x -= dx / camera.zoom;
            camera.y -= dy / camera.zoom;
        } else if (pointers.size === 2) {
            pointers.set(e.pointerId, e);
            const p = Array.from(pointers.values());
            const curDiff = Math.sqrt(Math.pow(p[0].clientX - p[1].clientX, 2) + Math.pow(p[0].clientY - p[1].clientY, 2));
            if (prevDiff > 0) {
                camera.zoom *= (curDiff / prevDiff);
                camera.zoom = Math.min(Math.max(camera.zoom, 0.5), 100);
            }
            prevDiff = curDiff;
        }
        pointers.set(e.pointerId, e);
        render();
    });

    canvas.addEventListener('pointerup', (e) => {
        if (!isMoving && pointers.size === 1) {
            const worldPos = screenToWorld(e.clientX, e.clientY);
            if (worldPos.x >= 0 && worldPos.x < WORLD_SIZE && worldPos.y >= 0 && worldPos.y < WORLD_SIZE) {
