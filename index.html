<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle Debug</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #e0e0e0; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: #fff; }
        .info {
            position: fixed; top: 10px; left: 10px;
            background: rgba(0,0,0,0.8); color: white;
            padding: 10px; border-radius: 5px; font-size: 14px;
            z-index: 1000; max-width: 80%;
        }
        .ui-panel { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
    </style>
</head>
<body>

<div class="info" id="status">Инициализация скрипта...</div>

<div class="ui-panel">
    <input type="color" id="colorPicker" value="#000000">
    <button id="btn-reset" style="padding:10px;">🏠 В центр</button>
</div>

<canvas id="canvas"></canvas>

<script type="module">
    // Импорт модулей
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, set, onChildAdded, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const status = document.getElementById('status');

    // Логгер для вывода ошибок на экран
    function log(msg, isError = false) {
        console.log(msg);
        status.innerText = msg;
        if(isError) status.style.color = "red";
    }

    try {
        const firebaseConfig = {
            apiKey: "AIzaSyDApXhn_Q3dF9kU9E_4uBrdk0wlcd09RHU",
            authDomain: "pixelbattale.firebaseapp.com",
            projectId: "pixelbattale",
            storageBucket: "pixelbattale.firebasestorage.app",
            messagingSenderId: "791983193798",
            appId: "1:791983193798:web:638379e16f2ab67aabe1c7",
            measurementId: "G-VLD5EVYFF0",
            databaseURL: "https://pixelbattale-default-rtdb.firebaseio.com/"
        };

        log("Подключение к Firebase...");
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Проверка подключения к базе
        const connectedRef = ref(db, ".info/connected");
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                log("Связь с базой установлена! Кликни на холст.");
            } else {
                log("Ожидание связи с сервером...");
            }
        });

        // Настройки холста
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const WORLD_SIZE = 1000;
        let camera = { x: 500, y: 500, zoom: 5 };
        let pixels = new Map();

        function render() {
            ctx.fillStyle = "#ccc";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);
            
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

            pixels.forEach((color, key) => {
                const [x, y] = key.split('_').map(Number);
                ctx.fillStyle = color;
                ctx.fillRect(x, y, 1, 1);
            });
            ctx.restore();
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        });
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Загрузка данных
        const pixelsRef = ref(db, 'pixels');
        onChildAdded(pixelsRef, (data) => {
            const val = data.val();
            pixels.set(`${val.x}_${val.y}`, val.color);
            render();
        });

        // Рисование
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const worldX = Math.floor((e.clientX - canvas.width / 2) / camera.zoom + camera.x);
            const worldY = Math.floor((e.clientY - canvas.height / 2) / camera.zoom + camera.y);

            if (worldX >= 0 && worldX < WORLD_SIZE && worldY >= 0 && worldY < WORLD_SIZE) {
                const color = document.getElementById('colorPicker').value;
                set(ref(db, `pixels/${worldX}_${worldY}`), { x: worldX, y: worldY, color });
            }
        });

        render();

    } catch (err) {
        log("Критическая ошибка: " + err.message, true);
    }
</script>
</body>
</html>
